<!DOCTYPE html>
<!--
Example Canvas Animation
Sam Scott, McMaster, 2024
-->
<html>

<head>
    <title>Example Canvas Animation</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <script type='text/javascript'>
        // Following best practices, it's all inside a window load event
        window.addEventListener("load", function (event) {
            // global variables (global to this function, that is)
            // to control the animation
            const ball = {
                x: 50, y: 50,
                xSpeed: -1, ySpeed: -2.5,
                red: 100, green: 0, blue: 0,
                radius: 10
            };

            const ball1 = {
                x: 750, y: 750,
                xSpeed: -1, ySpeed: -2.5,
                red: 0, green: 100, blue: 0,
                radius: 10
            };

            const ball2 = {
                x: 50, y: 750,
                xSpeed: -1, ySpeed: -2.5,
                red: 0, green: 0, blue: 100,
                radius: 10
            };

            const ball3 = {
                x: 750, y: 50,
                xSpeed: -1, ySpeed: -2.5,
                red: 0, green: 0, blue: 0,
                radius: 10
            };


            let timerId;            // holds the id of the timer

            const c = document.getElementById("animationCanvas");
            const ctx = c.getContext("2d");

            // starts the animation
            function startAnimation() {
                // 16  milliseconds works out to 62.5 frames per second.
                // for games, 60 frames per second is standard
                timerId = setInterval(updateAnimation, 16);
                console.log("Animation Started")
            }

            // stops the animation
            function stopAnimation() {
                clearTimeout(timerId);
                console.log("Animation Stopped")
            }

            // This function is called every 16 milliseconds
            function updateAnimation() {
                // 1. Update the position of the ball

                if (ball.y <= 750) {
                    ball.y += Math.abs(ball1.ySpeed); // always add to move down
                } else {
                    return none // then move horizontally
                }

                ball.radius += 0.01

                if (ball1.y <= 750) {
                    ball1.y -= Math.abs(ball1.ySpeed); // always add to move down
                } else {
                    ball1.x += ball1.xSpeed; // then move horizontally
                }

                ball1.radius += 0.01

                if (ball2.y < 600) {
                    ball2.y += Math.abs(ball2.ySpeed); // always add to move down
                } else {
                    ball2.x -= ball2.ySpeed; // then move horizontally
                }

                ball2.radius += 0.01

                if (ball3.y <= 50) {
                     ball3.x += ball3.ySpeed;// always add to move down
                } else {
                    ball3.x -= ball3.ySpeed; // then move horizontally
                }

                ball3.radius += 0.01


                let textOpacity = 0;
                let timerId;

                 if (textOpacity < 1) {
                    textOpacity += 0.01;
                }

                

                // 2. Clear the canvas
               

                // 3. Draw the frame using information stored in ball
                ctx.fillStyle = "rgb(" + ball.red + "," + ball.green + "," + ball.blue + ")";
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = "rgb(" + ball1.red + "," + ball1.green + "," + ball1.blue + ")";
                ctx.beginPath();
                ctx.arc(ball1.x, ball1.y, ball1.radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = "rgb(" + ball2.red + "," + ball2.green + "," + ball2.blue + ")";
                ctx.beginPath();
                ctx.arc(ball2.x, ball2.y, ball2.radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = "rgb(" + ball3.red + "," + ball3.green + "," + ball3.blue + ")";
                ctx.beginPath();
                ctx.arc(ball3.x, ball3.y, ball3.radius, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();

                ctx.save();

                ctx.globalAlpha = textOpacity;
                ctx.fillStyle = "black";
                ctx.font = "bold 70px Arial";
                ctx.textAlign = "center";

                ctx.fillText("MAGC", 400, 400);

                ctx.restore();

                // 4. Collision detection: stop the animation if the ball is at the edge of the canvas
                if (ball.x >= c.width - ball.radius || ball.x <= 0 + ball.radius || ball.y >= c.height - ball.radius || ball.y <= 0 + ball.radius) {
                    ball.red = 255;
                    ball.blue = 0;
                    ball.green = 0;

                    
                    ctx.fillStyle = "rgb(" + ball.red + "," + ball.green + "," + ball.blue + ")";
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                    ctx.closePath();
                    ctx.fill();
                    stopAnimation();


                }


            }

            // Start things up!
            startAnimation();
        });
    </script>
</head>

<body style='text-align:center;'>
    <canvas id='animationCanvas' width='800' height='800'
        style='background-color:white; border:1px solid black;'></canvas>
</body>

</html>
